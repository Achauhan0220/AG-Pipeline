<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AG Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --bg:#F5F4F0;--surface:#FFF;--border:#E5E3DC;--border-s:#CCCAB8;
  --text:#1C1B18;--t2:#6A6860;--t3:#A09E96;
  --green:#1E6B43;--gbg:#EAF4EE;--gborder:#A8D8BC;
  --amber:#8A5C0A;--abg:#FEF4DC;--aborder:#F0D080;
  --red:#A83228;--rbg:#FDEDEB;--rborder:#F0B0AA;
  --blue:#1A4F8A;--bbg:#EBF1FB;--bborder:#A8C4EE;
  --r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:44px 48px;text-align:center;max-width:360px;width:90%}
.auth-mark{width:40px;height:40px;background:var(--text);border-radius:8px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center}
.auth-mark span{color:white;font-size:15px;font-weight:600;letter-spacing:-1px}
.auth-title{font-size:18px;font-weight:600;margin-bottom:6px}
.auth-sub{font-size:13px;color:var(--t2);margin-bottom:28px;line-height:1.6}
.auth-err{font-size:12px;color:var(--red);margin-top:14px;display:none}

#app{display:none;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{font-size:14px;font-weight:600;letter-spacing:-.3px}
.topbar-l{display:flex;align-items:center;gap:14px}
.rpill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.r-agent{background:var(--bbg);color:var(--blue);border:1px solid var(--bborder)}
.r-tl{background:var(--abg);color:var(--amber);border:1px solid var(--aborder)}
.r-admin{background:#F0EBF8;color:#5B2D8A;border:1px solid #C9A8EE}
.topbar-r{display:flex;align-items:center;gap:10px}
.uchip{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--t2)}
.avatar{width:26px;height:26px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--t2);overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.btn-out{font-size:12px;color:var(--t3);background:none;border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;padding:3px 10px;font-family:'DM Sans',sans-serif}
.btn-out:hover{color:var(--t2);background:var(--bg)}

.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex}
.tab{padding:11px 14px;font-size:13px;font-weight:500;color:var(--t3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;margin-bottom:-1px;font-family:'DM Sans',sans-serif;transition:color .12s}
.tab:hover{color:var(--t2)}
.tab.active{color:var(--text);border-bottom-color:var(--text)}

.main{padding:24px;max-width:1000px;margin:0 auto}
.panel{display:none}
.panel.active{display:block}

.offer-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r)}
.offer-bar-lbl{font-size:12px;font-weight:500;color:var(--t2);white-space:nowrap}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border-s);background:var(--bg);color:var(--t2);cursor:pointer;transition:all .12s;font-family:'DM Sans',sans-serif}
.chip:hover{border-color:var(--text);color:var(--text)}
.chip.active{background:var(--text);color:#fff;border-color:var(--text)}
.chip.cn.active{background:var(--bg);color:var(--t2);border-color:var(--border-s)}

.add-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:18px}
.form-ttl{font-size:12px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.fr2{display:grid;grid-template-columns:1fr auto;gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;font-weight:500;color:var(--t2)}
.field input,.field select,.field textarea{padding:7px 10px;border:1px solid var(--border-s);border-radius:var(--rs);font-size:13px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);outline:none;transition:border-color .12s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--text);background:var(--surface)}
.field textarea{resize:vertical;min-height:56px}
.btn-p{padding:8px 18px;background:var(--text);color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;align-self:flex-end;transition:opacity .12s}
.btn-p:hover{opacity:.82}
.btn-p:disabled{opacity:.35;cursor:not-allowed}

.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-ttl{font-size:12px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.05em}
.bdg{font-size:11px;padding:2px 7px;border-radius:20px;background:var(--bg);color:var(--t2);border:1px solid var(--border);font-family:'DM Mono',monospace}

.lead-list{display:flex;flex-direction:column;gap:7px}
.empty{text-align:center;padding:40px 20px;color:var(--t3);font-size:13px}

.lcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.lcard.match{border-color:var(--gborder);background:var(--gbg)}
.lcard.stale{border-left:3px solid var(--amber)}
.ltop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px}
.lleft{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.lname{font-size:14px;font-weight:600}
.lcaseid{font-size:11px;color:var(--t3);font-family:'DM Mono',monospace}
.pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.p-offer{background:var(--bbg);color:var(--blue);border:1px solid var(--bborder)}
.p-match{background:var(--gbg);color:var(--green);border:1px solid var(--gborder)}
.p-stale{background:var(--abg);color:var(--amber);border:1px solid var(--aborder)}
.lactions{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap}
.btn-s{font-size:11px;padding:4px 9px;border:1px solid var(--border-s);border-radius:var(--rs);cursor:pointer;background:var(--surface);color:var(--t2);font-family:'DM Sans',sans-serif;transition:all .12s}
.btn-s:hover{background:var(--bg)}
.btn-cv{border-color:var(--gborder);color:var(--green);background:var(--gbg)}
.btn-cv:hover{background:#C8E8D0}
.btn-ni{border-color:var(--rborder);color:var(--red);background:var(--rbg)}
.btn-ni:hover{background:#F5D0CC}
.lmeta{display:flex;gap:14px;font-size:12px;color:var(--t2);flex-wrap:wrap}
.lnote{font-size:12px;color:var(--t2);font-style:italic;margin-top:4px}
.note-edit{display:none;margin-top:6px}
.note-edit textarea{width:100%;padding:6px 8px;border:1px solid var(--border-s);border-radius:var(--rs);font-size:12px;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);outline:none;resize:vertical;min-height:48px}
.note-edit textarea:focus{border-color:var(--text)}
.nea{display:flex;gap:6px;margin-top:5px}

.tog-bar{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:2px;width:fit-content;margin-bottom:20px}
.tog{padding:5px 14px;font-size:12px;font-weight:500;border:none;border-radius:4px;cursor:pointer;background:none;color:var(--t2);font-family:'DM Sans',sans-serif;transition:all .12s}
.tog.active{background:var(--surface);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.08)}

.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.slbl{font-size:11px;color:var(--t3);font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.sval{font-size:26px;font-weight:600;letter-spacing:-1px;font-family:'DM Mono',monospace}
.ssub{font-size:12px;color:var(--t2);margin-top:2px}
.sg-green{color:var(--green)}
.sg-amber{color:var(--amber)}

.bktable{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.bk-hdr{display:grid;grid-template-columns:1fr 60px 70px 70px 70px;gap:8px;padding:9px 16px;background:var(--bg);border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.04em}
.bk-row{display:grid;grid-template-columns:1fr 60px 70px 70px 70px;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;align-items:center}
.bk-row:last-child{border-bottom:none}
.bk-tot{background:var(--bg);font-weight:600}
.cbar-w{height:4px;background:var(--border);border-radius:2px;margin-top:3px}
.cbar{height:4px;background:var(--green);border-radius:2px}

.mgr-ctrl{display:flex;gap:10px;align-items:flex-end;margin-bottom:20px;flex-wrap:wrap}
.mgr-ctrl .field{min-width:150px}
.ms{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.col-hdr{display:grid;grid-template-columns:1fr 80px 80px 80px 120px;gap:8px;padding:7px 16px;font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.04em}
.col-hdr span:not(:first-child){text-align:right}

.tl-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.tl-hdr{display:grid;grid-template-columns:1fr 80px 80px 80px 120px;gap:8px;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border);align-items:center;cursor:pointer}
.tl-hdr:hover{background:#EDECE8}
.tl-nm{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.chev{font-size:9px;color:var(--t3);transition:transform .15s;display:inline-block}
.chev.open{transform:rotate(90deg)}
.tcol{font-size:12px;color:var(--t2);text-align:right;font-family:'DM Mono',monospace}
.tpipe{font-size:13px;font-weight:600;text-align:right;color:var(--green);font-family:'DM Mono',monospace}
.agent-rows{display:none}
.agent-rows.open{display:block}
.agent-row{display:grid;grid-template-columns:1fr 80px 80px 80px 120px;gap:8px;padding:8px 16px 8px 30px;border-bottom:1px solid var(--border);align-items:center;font-size:13px}
.agent-row:last-child{border-bottom:none}
.agent-row:hover{background:var(--bg)}

.loading{text-align:center;padding:40px;color:var(--t3);font-size:13px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--t2);border-radius:50%;animation:sp .7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:10px 16px;border-radius:var(--rs);font-size:13px;font-weight:500;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;z-index:999}
#toast.show{opacity:1;transform:translateY(0)}
@media(max-width:640px){.fr3{grid-template-columns:1fr 1fr}.sg{grid-template-columns:1fr 1fr}.ms{grid-template-columns:1fr 1fr}.main{padding:16px}}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-mark"><span>AG</span></div>
    <div class="auth-title">AG Pipeline</div>
    <div class="auth-sub">Sign in with your cult.fit or curefit Google account to access your pipeline.</div>
    <div id="g_signin"></div>
    <div class="auth-err" id="auth-err">Your account is not registered. Contact your Team Lead.</div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-l">
      <div class="brand">AG Pipeline</div>
      <div class="rpill" id="rpill"></div>
    </div>
    <div class="topbar-r">
      <div class="uchip">
        <div class="avatar" id="uavatar"></div>
        <span id="uname"></span>
      </div>
      <button class="btn-out" onclick="signOut()">Sign out</button>
    </div>
  </div>
  <div class="tab-bar" id="tab-bar"></div>
  <div class="main">

    <!-- PIPELINE TAB -->
    <div class="panel" id="panel-pipeline">
      <div class="offer-bar">
        <span class="offer-bar-lbl">Today's offer:</span>
        <div class="chips" id="offer-chips"></div>
      </div>
      <div class="add-form">
        <div class="form-ttl">Add hot lead</div>
        <div class="fr3">
          <div class="field"><label>Case ID</label><input type="text" id="f-cid" placeholder="CS-XXXXX"></div>
          <div class="field"><label>Customer name</label><input type="text" id="f-nm" placeholder="Full name"></div>
          <div class="field"><label>Offer interest</label>
            <select id="f-off">
              <option value="">Select offer</option>
              <option>Amazon Voucher</option><option>Extension</option>
              <option>Cultsport Freebie</option><option>Voucher+Extension</option><option>Salary Day</option>
            </select>
          </div>
        </div>
        <div class="fr2">
          <div class="field"><label>Notes (objection / best time to call / context)</label><textarea id="f-nt" placeholder="e.g. Wants to check with spouse, call after 6pm"></textarea></div>
          <button class="btn-p" onclick="addLead()">Add lead</button>
        </div>
      </div>
      <div class="sec-hdr">
        <span class="sec-ttl">Your pipeline</span>
        <span class="bdg" id="pipe-ct">0 open</span>
      </div>
      <div class="lead-list" id="lead-list"><div class="loading"><span class="spin"></span>Loading...</div></div>
    </div>

    <!-- STATS TAB -->
    <div class="panel" id="panel-stats">
      <div class="tog-bar">
        <button class="tog active" onclick="setPeriod('month',this)">This month</button>
        <button class="tog" onclick="setPeriod('all',this)">All time</button>
      </div>
      <div class="sg" id="stat-cards"></div>
      <div class="sec-hdr" style="margin-bottom:10px"><span class="sec-ttl">By offer type</span></div>
      <div class="bktable" id="bktable"></div>
    </div>

    <!-- MANAGER TAB -->
    <div class="panel" id="panel-manager">
      <div class="mgr-ctrl">
        <div class="field"><label>Offer type</label>
          <select id="mgr-off" onchange="loadMgr()" style="min-width:175px">
            <option value="all">All offers</option>
            <option>Amazon Voucher</option><option>Extension</option>
            <option>Cultsport Freebie</option><option>Voucher+Extension</option><option>Salary Day</option>
          </select>
        </div>
        <div class="field"><label>From</label><input type="date" id="mgr-from" onchange="loadMgr()"></div>
        <div class="field"><label>To</label><input type="date" id="mgr-to" onchange="loadMgr()"></div>
        <div class="field"><label>AOV (₹)</label><input type="number" id="mgr-aov" value="15000" min="1000" step="500" oninput="loadMgr()" style="width:120px"></div>
      </div>
      <div class="ms" id="mgr-sum"></div>
      <div class="col-hdr"><span>Team / Agent</span><span>Open</span><span>Converted</span><span>Not int.</span><span>Est. pipeline</span></div>
      <div id="mgr-tls"><div class="loading"><span class="spin"></span>Loading...</div></div>
    </div>

  </div>
</div>
<div id="toast"></div>

<script>
// ── CONFIG ── update these two values before deploying ──────
const SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL_HERE';
const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID_HERE';
// ────────────────────────────────────────────────────────────

const OFFERS = ['Amazon Voucher','Extension','Cultsport Freebie','Voucher+Extension','Salary Day'];
const MATCH_MAP = {
  'Amazon Voucher':['Amazon Voucher'],
  'Extension':['Extension'],
  'Cultsport Freebie':['Cultsport Freebie'],
  'Voucher+Extension':['Voucher+Extension','Amazon Voucher','Extension'],
  'Salary Day':['Salary Day'],
};

let CU = null; // current user
let myLeads = [];
let todayOffer = null;
let period = 'month';

// ── AUTH ──────────────────────────────────────────────────
window.onload = () => {
  google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleCred });
  google.accounts.id.renderButton(document.getElementById('g_signin'), { theme:'outline', size:'large', width:260 });
};

async function handleCred(resp) {
  const p = parseJwt(resp.credential);
  const res = await api('getAgent', { email: p.email });
  if (!res || res.error) { document.getElementById('auth-err').style.display='block'; return; }
  CU = { email:p.email, name:p.name, picture:p.picture, role:res.role, tlName:res.tlName, agentName:res.agentName };
  launchApp();
}

function parseJwt(t) {
  const b = t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  return JSON.parse(decodeURIComponent(atob(b).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')));
}

function signOut() {
  google.accounts.id.disableAutoSelect();
  CU = null;
  document.getElementById('app').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('auth-err').style.display='none';
}

// ── APP LAUNCH ────────────────────────────────────────────
function launchApp() {
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='block';

  const av = document.getElementById('uavatar');
  if (CU.picture) av.innerHTML=`<img src="${CU.picture}">`;
  else av.textContent = CU.name.charAt(0);
  document.getElementById('uname').textContent = CU.agentName || CU.name;

  const rp = document.getElementById('rpill');
  const rl = {agent:'Agent',tl:'Team Lead',admin:'Admin'};
  const rc = {agent:'r-agent',tl:'r-tl',admin:'r-admin'};
  rp.textContent = rl[CU.role]||'Agent';
  rp.className = 'rpill '+(rc[CU.role]||'r-agent');

  buildTabs();
  renderOfferChips();
  setDefaultDates();

  if (CU.role==='admin'||CU.role==='tl') { loadMgr(); showPanel('manager'); }
  else { loadMyLeads(); showPanel('pipeline'); }
}

function buildTabs() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML='';
  const tabs = CU.role==='agent'
    ? [{id:'pipeline',lbl:'My pipeline'},{id:'stats',lbl:'My stats'}]
    : CU.role==='tl'
    ? [{id:'manager',lbl:'Team pipeline'},{id:'pipeline',lbl:'My pipeline'},{id:'stats',lbl:'My stats'}]
    : [{id:'manager',lbl:'All teams'}];
  tabs.forEach((t,i)=>{
    const b=document.createElement('button');
    b.className='tab'+(i===0?' active':'');
    b.textContent=t.lbl;
    b.onclick=()=>{ document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); b.classList.add('active'); showPanel(t.id); };
    bar.appendChild(b);
  });
}

function showPanel(id) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id)?.classList.add('active');
  if (id==='stats') renderStats();
}

// ── OFFER CHIPS ───────────────────────────────────────────
function renderOfferChips() {
  const w = document.getElementById('offer-chips');
  w.innerHTML='';
  const nc = mkChip('No offer today',true,'cn');
  nc.onclick=()=>{ todayOffer=null; setChip(nc); renderLeads(); };
  w.appendChild(nc);
  OFFERS.forEach(o=>{
    const c=mkChip(o,false);
    c.onclick=()=>{ todayOffer=o; setChip(c); renderLeads(); };
    w.appendChild(c);
  });
}
function mkChip(lbl,active,cls){ const c=document.createElement('button'); c.className='chip'+(active?' active':'')+(cls?' '+cls:''); c.textContent=lbl; return c; }
function setChip(el){ document.querySelectorAll('#offer-chips .chip').forEach(c=>c.classList.remove('active')); el.classList.add('active'); }

// ── LEADS ─────────────────────────────────────────────────
async function loadMyLeads() {
  document.getElementById('lead-list').innerHTML='<div class="loading"><span class="spin"></span>Loading...</div>';
  const res = await api('getLeads',{email:CU.email});
  myLeads = res?.leads||[];
  renderLeads();
}

function renderLeads() {
  const el = document.getElementById('lead-list');
  const open = myLeads.filter(l=>l.status==='Open');
  document.getElementById('pipe-ct').textContent = open.length+' open';
  if (!open.length){ el.innerHTML='<div class="empty">No open leads. Add your first hot lead above.</div>'; return; }

  const ms = todayOffer ? new Set(MATCH_MAP[todayOffer]||[todayOffer]) : new Set();
  const sorted = [...open].sort((a,b)=>{
    const am=ms.has(a.offerInterest)?1:0, bm=ms.has(b.offerInterest)?1:0;
    if (bm!==am) return bm-am;
    return daysSince(b.dateAdded)-daysSince(a.dateAdded);
  });
  el.innerHTML='';
  sorted.forEach((l,i)=>el.appendChild(buildCard(l,i+1,ms.size>0&&ms.has(l.offerInterest))));
}

function buildCard(l,rank,match) {
  const days=daysSince(l.dateAdded), stale=days>=7;
  const d=document.createElement('div');
  d.className='lcard'+(match?' match':'')+(stale&&!match?' stale':'');
  d.dataset.id=l.id;
  d.innerHTML=`
    <div class="ltop">
      <div class="lleft">
        <span class="lname">${x(l.customerName)}</span>
        <span class="lcaseid">${x(l.caseId)}</span>
        <span class="pill p-offer">${x(l.offerInterest)}</span>
        ${match?'<span class="pill p-match">&#10003; Offer match</span>':''}
        ${stale?'<span class="pill p-stale">'+days+'d old</span>':''}
      </div>
      <div class="lactions">
        <button class="btn-s" onclick="toggleNote('${l.id}')">Note</button>
        <button class="btn-s" onclick="markCalled('${l.id}')">Called today</button>
        <button class="btn-s btn-cv" onclick="closeLead('${l.id}','Converted')">Converted</button>
        <button class="btn-s btn-ni" onclick="closeLead('${l.id}','Not Interested')">Not interested</button>
      </div>
    </div>
    <div class="lmeta">
      <span>Added ${fmtDate(l.dateAdded)}</span>
      ${l.lastContacted?'<span>Last called '+fmtDate(l.lastContacted)+'</span>':'<span style="color:var(--amber)">Not called yet</span>'}
    </div>
    ${l.notes?'<div class="lnote" id="nt-'+l.id+'">'+x(l.notes)+'</div>':'<div class="lnote" id="nt-'+l.id+'" style="display:none"></div>'}
    <div class="note-edit" id="ne-${l.id}">
      <textarea id="nta-${l.id}" placeholder="Update notes...">${x(l.notes||'')}</textarea>
      <div class="nea">
        <button class="btn-s btn-cv" onclick="saveNote('${l.id}')">Save</button>
        <button class="btn-s" onclick="toggleNote('${l.id}')">Cancel</button>
      </div>
    </div>`;
  return d;
}

function toggleNote(id){ const e=document.getElementById('ne-'+id); e.style.display=e.style.display==='block'?'none':'block'; }

async function saveNote(id) {
  const notes=document.getElementById('nta-'+id).value.trim();
  await api('updateLead',{id,notes});
  const l=myLeads.find(l=>l.id===id); if(l) l.notes=notes;
  document.getElementById('ne-'+id).style.display='none';
  const nt=document.getElementById('nt-'+id); nt.textContent=notes; nt.style.display=notes?'block':'none';
  toast('Note saved');
}

async function markCalled(id) {
  const today=new Date().toISOString().split('T')[0];
  await api('updateLead',{id,lastContacted:today});
  const l=myLeads.find(l=>l.id===id); if(l) l.lastContacted=today;
  renderLeads(); toast('Marked as called today');
}

async function closeLead(id,status) {
  await api('updateLead',{id,status});
  const l=myLeads.find(l=>l.id===id); if(l) l.status=status;
  renderLeads(); toast(status==='Converted'?'&#10003; Converted!':'Lead closed');
}

async function addLead() {
  const caseId=document.getElementById('f-cid').value.trim();
  const customerName=document.getElementById('f-nm').value.trim();
  const offerInterest=document.getElementById('f-off').value;
  const notes=document.getElementById('f-nt').value.trim();
  if(!caseId||!customerName||!offerInterest){ toast('Fill in all required fields'); return; }
  const btn=document.querySelector('.btn-p'); btn.disabled=true; btn.textContent='Adding...';
  const res=await api('addLead',{caseId,customerName,offerInterest,notes,agentEmail:CU.email});
  btn.disabled=false; btn.textContent='Add lead';
  if(res?.success){ myLeads.push(res.lead); ['f-cid','f-nm','f-nt'].forEach(id=>document.getElementById(id).value=''); document.getElementById('f-off').value=''; renderLeads(); toast('Lead added'); }
  else toast('Error adding lead. Try again.');
}

// ── STATS ─────────────────────────────────────────────────
function setPeriod(p,btn) {
  period=p;
  document.querySelectorAll('.tog').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderStats();
}

function renderStats() {
  const ms=new Date(); const mStart=new Date(ms.getFullYear(),ms.getMonth(),1).toISOString().split('T')[0];
  const data=period==='month'?myLeads.filter(l=>l.dateAdded>=mStart):myLeads;
  const open=data.filter(l=>l.status==='Open').length;
  const conv=data.filter(l=>l.status==='Converted').length;
  const ni=data.filter(l=>l.status==='Not Interested').length;
  const cl=conv+ni; const cvr=cl>0?Math.round(conv/cl*100):0;
  document.getElementById('stat-cards').innerHTML=`
    <div class="sc"><div class="slbl">Open</div><div class="sval">${open}</div><div class="ssub">in pipeline</div></div>
    <div class="sc"><div class="slbl">Converted</div><div class="sval sg-green">${conv}</div><div class="ssub">closed won</div></div>
    <div class="sc"><div class="slbl">Conversion rate</div><div class="sval">${cvr}%</div><div class="ssub">of closed leads</div></div>`;

  const bk=document.getElementById('bktable');
  bk.innerHTML=`<div class="bk-hdr"><span>Offer type</span><span style="text-align:right">Open</span><span style="text-align:right">Converted</span><span style="text-align:right">Not int.</span><span style="text-align:right">Conv %</span></div>`;
  let to=0,tc=0,tn=0;
  OFFERS.forEach(offer=>{
    const g=data.filter(l=>l.offerInterest===offer);
    if(!g.length) return;
    const o=g.filter(l=>l.status==='Open').length, c=g.filter(l=>l.status==='Converted').length, n=g.filter(l=>l.status==='Not Interested').length;
    const cv=c+n>0?Math.round(c/(c+n)*100):0;
    to+=o; tc+=c; tn+=n;
    const r=document.createElement('div'); r.className='bk-row';
    r.innerHTML=`<div><div style="font-size:13px;font-weight:500">${offer}</div><div class="cbar-w"><div class="cbar" style="width:${cv}%"></div></div></div><div style="text-align:right;font-family:'DM Mono',monospace">${o}</div><div style="text-align:right;font-family:'DM Mono',monospace;color:var(--green)">${c}</div><div style="text-align:right;font-family:'DM Mono',monospace;color:var(--t2)">${n}</div><div style="text-align:right;font-family:'DM Mono',monospace">${cv}%</div>`;
    bk.appendChild(r);
  });
  const tcl=tc+tn, tcvr=tcl>0?Math.round(tc/tcl*100):0;
  const tr=document.createElement('div'); tr.className='bk-row bk-tot';
  tr.innerHTML=`<div>Total</div><div style="text-align:right;font-family:'DM Mono',monospace">${to}</div><div style="text-align:right;font-family:'DM Mono',monospace;color:var(--green)">${tc}</div><div style="text-align:right;font-family:'DM Mono',monospace;color:var(--t2)">${tn}</div><div style="text-align:right;font-family:'DM Mono',monospace">${tcvr}%</div>`;
  bk.appendChild(tr);
}

// ── MANAGER ───────────────────────────────────────────────
function setDefaultDates() {
  const to=new Date(), fr=new Date(); fr.setDate(fr.getDate()-7);
  document.getElementById('mgr-to').value=to.toISOString().split('T')[0];
  document.getElementById('mgr-from').value=fr.toISOString().split('T')[0];
}

async function loadMgr() {
  const offer=document.getElementById('mgr-off')?.value||'all';
  const from=document.getElementById('mgr-from')?.value;
  const to=document.getElementById('mgr-to')?.value;
  const aov=parseInt(document.getElementById('mgr-aov')?.value)||15000;
  document.getElementById('mgr-tls').innerHTML='<div class="loading"><span class="spin"></span>Loading...</div>';
  const res=await api('getAllLeads',{role:CU.role,email:CU.email,offer,from,to});
  renderMgr(res?.leads||[], aov);
}

function renderMgr(leads, aov) {
  const open=leads.filter(l=>l.status==='Open').length;
  const conv=leads.filter(l=>l.status==='Converted').length;
  const ni=leads.filter(l=>l.status==='Not Interested').length;
  document.getElementById('mgr-sum').innerHTML=`
    <div class="sc"><div class="slbl">Open leads</div><div class="sval">${open}</div><div class="ssub">in date range</div></div>
    <div class="sc"><div class="slbl">Converted</div><div class="sval sg-green">${conv}</div></div>
    <div class="sc"><div class="slbl">Not interested</div><div class="sval" style="color:var(--t2)">${ni}</div></div>
    <div class="sc"><div class="slbl">Est. pipeline</div><div class="sval sg-green">&#8377;${fmtL(open*aov)}</div><div class="ssub">@ &#8377;${aov.toLocaleString('en-IN')}</div></div>`;

  const byTL={};
  leads.forEach(l=>{
    const tl=l.tlName||'Unassigned', ag=l.agentName||l.agentEmail;
    if(!byTL[tl]) byTL[tl]={};
    if(!byTL[tl][ag]) byTL[tl][ag]={o:0,c:0,n:0};
    if(l.status==='Open') byTL[tl][ag].o++;
    else if(l.status==='Converted') byTL[tl][ag].c++;
    else if(l.status==='Not Interested') byTL[tl][ag].n++;
  });

  const ct=document.getElementById('mgr-tls'); ct.innerHTML='';
  if(!Object.keys(byTL).length){ ct.innerHTML='<div class="empty">No leads found for the selected filters.</div>'; return; }

  Object.entries(byTL).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([tl,agents])=>{
    const to=Object.values(agents).reduce((s,a)=>s+a.o,0);
    const tc=Object.values(agents).reduce((s,a)=>s+a.c,0);
    const tn=Object.values(agents).reduce((s,a)=>s+a.n,0);
    const safe=tl.replace(/[^a-zA-Z0-9]/g,'_');
    const blk=document.createElement('div'); blk.className='tl-block';
    blk.innerHTML=`
      <div class="tl-hdr" onclick="toggleTL('${safe}',this)">
        <div class="tl-nm"><span class="chev" id="chev-${safe}">&#9654;</span>${x(tl)}</div>
        <span class="tcol">${to}</span><span class="tcol">${tc}</span><span class="tcol">${tn}</span>
        <span class="tpipe">&#8377;${fmtL(to*aov)}</span>
      </div>
      <div class="agent-rows" id="ar-${safe}">
        ${Object.entries(agents).sort((a,b)=>b[1].o-a[1].o).map(([ag,d])=>`
          <div class="agent-row">
            <span style="color:var(--t2)">${x(ag)}</span>
            <span style="text-align:right;font-family:'DM Mono',monospace">${d.o}</span>
            <span style="text-align:right;font-family:'DM Mono',monospace;color:var(--green)">${d.c}</span>
            <span style="text-align:right;font-family:'DM Mono',monospace;color:var(--t2)">${d.n}</span>
            <span style="text-align:right;font-family:'DM Mono',monospace;color:var(--green)">&#8377;${fmtL(d.o*aov)}</span>
          </div>`).join('')}
      </div>`;
    ct.appendChild(blk);
  });
}

function toggleTL(safe, hdr) {
  const rows=document.getElementById('ar-'+safe);
  const chev=document.getElementById('chev-'+safe);
  const isOpen=rows.classList.toggle('open');
  if(chev) chev.style.transform=isOpen?'rotate(90deg)':'';
}

// ── API ───────────────────────────────────────────────────
async function api(action, params={}) {
  try {
    const url=SCRIPT_URL+'?action='+action+'&'+new URLSearchParams(params).toString();
    const r=await fetch(url); return await r.json();
  } catch(e){ console.error(e); return null; }
}

// ── UTILS ─────────────────────────────────────────────────
function x(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function daysSince(d){ if(!d) return 0; return Math.floor((new Date()-new Date(d))/86400000); }
function fmtDate(d){ if(!d) return ''; return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short'}); }
function fmtL(n){ if(n>=100000) return (n/100000).toFixed(1)+'L'; if(n>=1000) return Math.round(n/1000)+'K'; return n.toLocaleString('en-IN'); }
let _tt; function toast(m){ const e=document.getElementById('toast'); e.innerHTML=m; e.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(()=>e.classList.remove('show'),2500); }
</script>
